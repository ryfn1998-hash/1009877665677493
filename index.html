<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Wars - 官方機器人混戰主控後台 👑</title>
    <style>
        body {
            margin: 0;
            background-color: #0e1111;
            color: #eceff1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 🎛️ 左側管理控制台 */
        #admin-panel {
            width: 380px;
            background-color: #1c2324;
            box-shadow: 4px 0 20px rgba(0,0,0,0.7);
            z-index: 30;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            border-right: 2px solid #2d383a;
        }

        h2 { margin: 0; font-size: 20px; color: #00e676; text-align: center; border-bottom: 2px solid #2d383a; padding-bottom: 10px;}
        h3 { margin: 0; font-size: 14px; color: #81d4fa; text-transform: uppercase; letter-spacing: 1px;}

        .section {
            background: #252f31;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #37474f;
        }

        .input-group {
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        label { font-size: 12px; color: #b0bec5; }
        input[type="number"], input[type="file"] {
            background: #14191a;
            border: 1px solid #455a64;
            padding: 8px;
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
        }
        
        button {
            background: #0076ff;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }
        button:hover { background: #005ecb; transform: translateY(-1px); }
        button.stop { background: #d32f2f; }
        button.stop:hover { background: #b71c1c; }

        .status-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            background: #ff5722;
            color: white;
            margin-top: 5px;
        }
        .status-badge.active { background: #4caf50; }

        /* 🗺️ 右側畫布預覽區 */
        #preview-area {
            flex: 1;
            position: relative;
            background-color: #121212;
            cursor: grab;
        }
        #canvas-wrapper {
            position: absolute;
            background-color: white;
            transform-origin: 0 0;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>

    <div id="admin-panel">
        <h2>機器人大戰控制台 👑</h2>

        <div class="section">
            <h3>📊 客戶端數值操控</h3>
            <div class="input-group" style="margin-top:10px;">
                <label>修改「即時在線人數」</label>
                <input type="number" id="input-online" value="99">
            </div>
            <div class="input-group">
                <label>修改「總瀏覽次數」</label>
                <input type="number" id="input-views" value="88888">
            </div>
            <button onclick="updateClientStats()">推送數據到前端網頁</button>
        </div>

        <div class="section">
            <h3>🤖 隨機亂塗鴉機器人組</h3>
            <div class="input-group" style="margin-top:10px;">
                <label>假人軍團數量</label>
                <input type="number" id="bot-count" value="10">
            </div>
            <div class="input-group">
                <label>出點冷卻速度 (毫秒/點)</label>
                <input type="number" id="bot-speed" value="300">
            </div>
            <button id="btn-toggle-rand-bot" onclick="toggleRandomBots()">啟動假人軍團大亂鬥</button>
            <div id="rand-bot-status" class="status-badge">狀態：關閉中</div>
        </div>

        <div class="section">
            <h3>🖼️ 圖片列印機器人印章</h3>
            <div class="input-group" style="margin-top:10px;">
                <label>上傳目標圖片 (會自動點陣化)</label>
                <input type="file" id="image-loader" accept="image/*">
            </div>
            <div style="display: flex; gap: 10px;">
                <div class="input-group" style="flex:1;">
                    <label>起點 X 座標</label>
                    <input type="number" id="img-start-x" value="100">
                </div>
                <div class="input-group" style="flex:1;">
                    <label>起點 Y 座標</label>
                    <input type="number" id="img-start-y" value="100">
                </div>
            </div>
            <button id="btn-toggle-img-bot" onclick="startImagePrinterBot()">啟動圖片機器人印章</button>
            <div id="img-bot-status" class="status-badge">狀態：閒置中</div>
        </div>
        
        <div class="section" style="background:#1a1f21; text-align:center; font-size:11px; color:#607d8b;">
            提示：點擊右側畫布並拖曳、或滾動滾輪，可以即時監看戰場現況。
        </div>
    </div>

    <div id="preview-area" id="viewport">
        <div id="canvas-wrapper">
            <canvas id="pixelCanvas"></canvas>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCBdgYtNIFl21qObobpNCVsovzrAoPPUv8",
            authDomain: "my-pixel-wars.firebaseapp.com",
            projectId: "my-pixel-wars",
            storageBucket: "my-pixel-wars.firebasestorage.app",
            messagingSenderId: "559903428145",
            appId: "1:559903428145:web:2f9b3db4f56a1abb918f10",
            measurementId: "G-Q378F75DH8",
            databaseURL: "https://my-pixel-wars-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const pixelsRef = db.ref('pixels');
        const ServerValue = firebase.database.ServerValue;

        // 初始化抓取現有設定值
        db.ref('stats/onlineUsers').once('value', s => { if(s.exists()) document.getElementById('input-online').value = s.val(); });
        db.ref('stats/totalViews').once('value', s => { if(s.exists()) document.getElementById('input-views').value = s.val(); });

        // 1. 客戶端數據修改發送函數
        function updateClientStats() {
            const onlineValue = parseInt(document.getElementById('input-online').value, 10);
            const viewsValue = parseInt(document.getElementById('input-views').value, 10);
            
            db.ref('stats').set({
                onlineUsers: onlineValue,
                totalViews: viewsValue
            }).then(() => {
                alert("👑 成功注入上帝數值至前端客戶端！");
            });
        }

        // 2. 隨機假人機器人模組邏輯
        let randomBotIntervals = [];
        let randomBotsActive = false;
        const hexColors = ["#000000", "#ffffff", "#e50000", "#00cc00", "#0000e5", "#f5f500", "#a000a0", "#00a0a0"];

        function toggleRandomBots() {
            const btn = document.getElementById('btn-toggle-rand-bot');
            const status = document.getElementById('rand-bot-status');
            
            if (!randomBotsActive) {
                const count = parseInt(document.getElementById('bot-count').value, 10);
                const speed = parseInt(document.getElementById('bot-speed').value, 10);
                
                randomBotIntervals = [];
                for(let i=0; i<count; i++) {
                    let interval = setInterval(() => {
                        let rx = Math.floor(Math.random() * MAP_SIZE);
                        let ry = Math.floor(Math.random() * MAP_SIZE);
                        let rc = hexColors[Math.floor(Math.random() * hexColors.length)];
                        
                        pixelsRef.child(`x${rx}_y${ry}`).set({
                            color: rc,
                            timestamp: ServerValue.TIMESTAMP
                        });
                    }, speed + (Math.random() * 100)); // 略微錯開避免同時發包
                    randomBotIntervals.push(interval);
                }
                
                randomBotsActive = true;
                btn.innerText = "終止假人軍團大亂鬥";
                btn.classList.add('stop');
                status.innerText = "狀態：大軍肆虐中 🔥";
                status.classList.add('active');
            } else {
                randomBotIntervals.forEach(clearInterval);
                randomBotIntervals = [];
                randomBotsActive = false;
                btn.innerText = "啟動假人軍團大亂鬥";
                btn.classList.remove('stop');
                status.innerText = "狀態：關閉中";
                status.classList.remove('active');
            }
        }

        // 3. 手動精準控制：自動讀圖畫布像素列印印章機器人邏輯
        let imgPrinterActive = false;
        let pixelQueue = [];
        let imgPrinterTimeout = null;

        function startImagePrinterBot() {
            const fileInput = document.getElementById('image-loader');
            const btn = document.getElementById('btn-toggle-img-bot');
            const status = document.getElementById('img-bot-status');

            if (imgPrinterActive) {
                // 取消下列印
                clearTimeout(imgPrinterTimeout);
                pixelQueue = [];
                imgPrinterActive = false;
                btn.innerText = "啟動圖片機器人印章";
                btn.classList.remove('stop');
                status.innerText = "狀態：已中止 🛑";
                status.classList.remove('active');
                return;
            }

            if (!fileInput.files || !fileInput.files[0]) {
                alert("請先選擇一張想要上傳列印的圖片檔！");
                return;
            }

            const startX = parseInt(document.getElementById('img-start-x').value, 10);
            const startY = parseInt(document.getElementById('img-start-y').value, 10);
            const file = fileInput.files[0];
            const reader = new FileReader();

            status.innerText = "狀態：正在解析並點陣化圖片...";
            
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    // 利用隱藏的 canvas 擷取色彩矩陣
                    const tempCanvas = document.createElement('canvas');
                    const tempCtx = tempCanvas.getContext('2d');
                    
                    // 防呆限制：如果圖片大於畫布，將其限缩
                    let w = img.width;
                    let h = img.height;
                    if(startX + w > MAP_SIZE) w = MAP_SIZE - startX;
                    if(startY + h > MAP_SIZE) h = MAP_SIZE - startY;
                    
                    tempCanvas.width = w;
                    tempCanvas.height = h;
                    tempCtx.drawImage(img, 0, 0, w, h);
                    
                    const imgData = tempCtx.getImageData(0, 0, w, h).data;
                    pixelQueue = [];

                    // 將全圖像素轉移到自動列印隊列中
                    for (let y = 0; y < h; y++) {
                        for (let x = 0; x < w; x++) {
                            const idx = (y * w + x) * 4;
                            const r = imgData[idx];
                            const g = imgData[idx+1];
                            const b = imgData[idx+2];
                            const a = imgData[idx+3];
                            
                            // 略過透明像素點
                            if (a > 50) { 
                                const hex = "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
                                pixelQueue.push({ targetX: startX + x, targetY: startY + y, color: hex });
                            }
                        }
                    }

                    if(pixelQueue.length === 0) {
                        alert("解析失敗或圖片全為透明！");
                        status.innerText = "狀態：閒置中";
                        return;
                    }

                    imgPrinterActive = true;
                    btn.innerText = "中止圖片列印機器人";
                    btn.classList.add('stop');
                    status.innerText = `狀態：繪製中 (剩餘 ${pixelQueue.length} 像素點)`;
                    status.classList.add('active');
                    
                    // 啟動多點併發節流列印閥
                    runImagePrinterLoop();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        // 圖片像素隊列自動消耗循環 (每 30 毫秒高速並行寫入 5 個點避免 Firebase 阻塞)
        function runImagePrinterLoop() {
            if (!imgPrinterActive || pixelQueue.length === 0) {
                imgPrinterActive = false;
                document.getElementById('btn-toggle-img-bot').innerText = "啟動圖片機器人印章";
                document.getElementById('btn-toggle-img-bot').classList.remove('stop');
                document.getElementById('img-bot-status').innerText = "狀態：列印大功告成！👑";
                document.getElementById('img-bot-status').classList.remove('active');
                return;
            }

            const batchSize = 8; // 後台管理者專屬併發出點數（高速完成）
            for(let i=0; i<batchSize; i++) {
                if(pixelQueue.length > 0) {
                    const p = pixelQueue.shift();
                    db.ref(`pixels/x${p.targetX}_y${p.targetY}`).set({
                        color: p.color,
                        timestamp: ServerValue.TIMESTAMP
                    });
                }
            }

            document.getElementById('img-bot-status').innerText = `狀態：繪製中 (剩餘 ${pixelQueue.length} 點)`;
            imgPrinterTimeout = setTimeout(runImagePrinterLoop, 25);
        }

        // ===================== 以下為右側後台畫布引擎渲染及同步代碼 =====================
        const viewport = document.getElementById('preview-area');
        const wrapper = document.getElementById('canvas-wrapper');
        const canvas = document.getElementById('pixelCanvas');
        const ctx = canvas.getContext('2d');

        const MAP_SIZE = 500; 
        const CELL_SIZE = 10;

        wrapper.style.width = (MAP_SIZE * CELL_SIZE) + 'px';
        wrapper.style.height = (MAP_SIZE * CELL_SIZE) + 'px';
        canvas.width = MAP_SIZE;
        canvas.height = MAP_SIZE;
        ctx.imageSmoothingEnabled = false;

        let scale = 0.15; // 預設縮小以便後台全景看戰局
        let offsetX = 50;       
        let offsetY = 50;       
        let isDragging = false;
        let startX, startY;
        const localMap = {};

        let renderRequested = false;
        function requestRender() {
            if (!renderRequested) {
                renderRequested = true;
                requestAnimationFrame(() => { renderRequested = false; render(); });
            }
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let key in localMap) {
                const [x, y] = key.split(',').map(Number);
                ctx.fillStyle = localMap[key];
                ctx.fillRect(x, y, 1, 1);
            }
            wrapper.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
        }

        pixelsRef.on('child_added', (snapshot) => {
            const key = snapshot.key; const data = snapshot.val();
            const cleanKey = key.replace('x', '').replace('y', '').replace('_', ',');
            localMap[cleanKey] = data.color; requestRender();
        });

        pixelsRef.on('child_changed', (snapshot) => {
            const key = snapshot.key; const data = snapshot.val();
            const cleanKey = key.replace('x', '').replace('y', '').replace('_', ',');
            localMap[cleanKey] = data.color; requestRender();
        });

        // 畫布滑鼠操作監視器
        viewport.addEventListener('mousedown', (e) => {
            isDragging = true; startX = e.clientX - offsetX; startY = e.clientY - offsetY;
        });
        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return; offsetX = e.clientX - startX; offsetY = e.clientY - startY; requestRender();
        });
        window.addEventListener('mouseup', () => { isDragging = false; });
        viewport.addEventListener('wheel', (e) => {
            e.preventDefault(); const zoomFactor = 1.2;
            if (e.deltaY < 0) scale *= zoomFactor; else scale /= zoomFactor;
            scale = Math.max(0.02, Math.min(scale, 15)); requestRender();
        }, { passive: false });

        requestRender();
    </script>
</body>
</html>
